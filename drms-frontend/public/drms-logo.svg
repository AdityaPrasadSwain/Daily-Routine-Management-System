<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Gradient Definitions -->
    <defs>
        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#db2777;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#f472b6;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- Background Circle -->
    <circle cx="24" cy="24" r="22" fill="url(#grad1)" opacity="0.1" />

    <!-- Main Icon - Tree/Hierarchy Structure -->
    <!-- Top Node -->
    <circle cx="24" cy="10" r="3" fill="url(#grad1)" />

    <!-- Middle Level Nodes -->
    <circle cx="14" cy="22" r="2.5" fill="url(#grad2)" />
    <circle cx="24" cy="22" r="2.5" fill="url(#grad2)" />
    <circle cx="34" cy="22" r="2.5" fill="url(#grad2)" />

    <!-- Bottom Level Nodes -->
    <circle cx="10" cy="34" r="2" fill="url(#grad1)" />
    <circle cx="18" cy="34" r="2" fill="url(#grad1)" />
    <circle cx="24" cy="34" r="2" fill="url(#grad1)" />
    <circle cx="30" cy="34" r="2" fill="url(#grad1)" />
    <circle cx="38" cy="34" r="2" fill="url(#grad1)" />

    <!-- Connecting Lines -->
    <line x1="24" y1="13" x2="24" y2="19.5" stroke="url(#grad1)" stroke-width="2"
        stroke-linecap="round" />

    <line x1="24" y1="19.5" x2="14" y2="19.5" stroke="url(#grad2)" stroke-width="1.5"
        stroke-linecap="round" />
    <line x1="24" y1="19.5" x2="34" y2="19.5" stroke="url(#grad2)" stroke-width="1.5"
        stroke-linecap="round" />

    <line x1="14" y1="24.5" x2="14" y2="30" stroke="url(#grad1)" stroke-width="1.5"
        stroke-linecap="round" />
    <line x1="24" y1="24.5" x2="24" y2="32" stroke="url(#grad1)" stroke-width="1.5"
        stroke-linecap="round" />
    <line x1="34" y1="24.5" x2="34" y2="30" stroke="url(#grad1)" stroke-width="1.5"
        stroke-linecap="round" />

    <line x1="14" y1="30" x2="10" y2="32" stroke="url(#grad1)" stroke-width="1.5"
        stroke-linecap="round" />
    <line x1="14" y1="30" x2="18" y2="32" stroke="url(#grad1)" stroke-width="1.5"
        stroke-linecap="round" />
    <line x1="34" y1="30" x2="30" y2="32" stroke="url(#grad1)" stroke-width="1.5"
        stroke-linecap="round" />
    <line x1="34" y1="30" x2="38" y2="32" stroke="url(#grad1)" stroke-width="1.5"
        stroke-linecap="round" />
</svg>